      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .asymmetric-gradient {
        background: linear-gradient(135deg, #001E40 0%, #003366 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="bg-slate-50 dark:bg-slate-950 flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="transition-all duration-200 active:scale-95 p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-400">menu</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-tight font-bold text-xl font-black text-blue-900 dark:text-blue-200">Kinetic Path</h1>
</div>
<button class="transition-all duration-200 active:scale-95 p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-400">account_circle</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-5 max-w-2xl mx-auto w-full">
<!-- Search Hero Section -->
<section class="mb-10">
<h2 class="font-headline text-display-sm font-bold tracking-tight text-primary mb-6">Find Your Next Path</h2>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">search</span>
</div>
<input class="w-full h-16 pl-14 pr-6 rounded-2xl bg-surface-container-lowest text-on-surface border-none focus:ring-2 focus:ring-primary shadow-sm font-medium placeholder:text-on-surface-variant/60 transition-all duration-200" placeholder="Enter Stop Code or Name" type="text"/>
</div>
</section>
<!-- Dynamic Map Preview (Asymmetric Layout) -->
<section class="mb-10">
<div class="relative h-48 rounded-[2rem] overflow-hidden bg-surface-container shadow-sm">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="stylized architectural map view of a city transit hub with glowing blue lines indicating routes and soft grey buildings" data-location="Istanbul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJgbWyz4b1NAlFLVFJ_lJhPbbED3QIEpTzmWQnNvJMMjoqPX8fVmR2nuw-zg3_vjahGCGJQpd8JMDopvnZNNxa_dziSzALAoWFqW3PcO2pOEtyKCfJjC5BldkA9Ob3b57ayDEr5_VyQVOT0hM8kTbLrW32kFngt4m8G5brV7qe-ptY4CxrZV9hpgqIlscgoA6pBjef_LVnk52IqBeE3kbltWiYJ5NDoJpROGeHWd1ma_Z_xxdQKRyvTru9FJgDB6nzIS4H-bqvlBAt"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div class="glass-morphism p-4 rounded-2xl border border-white/20">
<p class="font-label text-[10px] uppercase tracking-widest text-primary font-bold mb-1">Current Location</p>
<p class="font-headline text-on-surface font-bold">Besiktas District</p>
</div>
<button class="asymmetric-gradient p-4 rounded-full text-white shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
</section>
<!-- Popular Stops Section (Tonal Depth over Borders) -->
<section>
<div class="flex items-center justify-between mb-6 px-1">
<h3 class="font-headline text-xl font-bold text-primary">Popular Stops</h3>
<button class="font-label text-xs font-bold text-primary-container tracking-wider uppercase">View Map</button>
</div>
<div class="space-y-4">
<!-- Stop Card 1 -->
<button class="w-full flex items-center justify-between p-5 rounded-[1.5rem] bg-surface-container-lowest hover:bg-surface-container-low transition-colors duration-200 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-primary-fixed-dim flex items-center justify-center">
<span class="material-symbols-outlined text-primary">directions_bus</span>
</div>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Kadıköy Merkez</p>
<p class="font-label text-xs text-on-surface-variant uppercase tracking-wide">Main Terminal • Platform A</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-black text-primary text-xl">2m</span>
<span class="font-label text-[10px] text-tertiary font-bold">ON TIME</span>
</div>
</button>
<!-- Stop Card 2 -->
<button class="w-full flex items-center justify-between p-5 rounded-[1.5rem] bg-surface-container-low hover:bg-surface-container-high transition-colors duration-200 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">sailing</span>
</div>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Beşiktaş Meydan</p>
<p class="font-label text-xs text-on-surface-variant uppercase tracking-wide">Ferry Terminal • Gate 3</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-black text-primary text-xl">8m</span>
<span class="font-label text-[10px] text-on-surface-variant font-bold">ESTIMATED</span>
</div>
</button>
<!-- Stop Card 3 -->
<button class="w-full flex items-center justify-between p-5 rounded-[1.5rem] bg-surface-container-lowest hover:bg-surface-container-low transition-colors duration-200 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant">train</span>
</div>
<div>
<p class="font-headline font-bold text-on-surface text-lg">Kadıköy Sahil</p>
<p class="font-label text-xs text-on-surface-variant uppercase tracking-wide">Coastal Line • Station B</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-black text-error text-xl">DELAY</span>
<span class="font-label text-[10px] text-error font-bold">12m LATE</span>
</div>
</button>
</div>
</section>
<!-- Quick Insights Bento Grid -->
<section class="mt-12 grid grid-cols-2 gap-4">
<div class="col-span-1 p-6 rounded-[2rem] bg-primary text-white flex flex-col justify-between h-40">
<span class="material-symbols-outlined text-3xl opacity-50">confirmation_number</span>
<div>
<p class="font-label text-[10px] uppercase tracking-widest font-bold opacity-70">Active Passes</p>
<p class="font-headline text-2xl font-bold">2 Tickets</p>
</div>
</div>
<div class="col-span-1 p-6 rounded-[2rem] bg-surface-container-high flex flex-col justify-between h-40">
<span class="material-symbols-outlined text-3xl text-primary opacity-50">history</span>
<div>
<p class="font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Last Journey</p>
<p class="font-headline text-lg font-bold text-on-surface">Uskudar Hub</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-blue-900 dark:bg-blue-800 text-white rounded-2xl px-5 py-2 transition-transform duration-300 ease-out active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Search -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 transition-transform duration-300 ease-out active:scale-90 hover:text-blue-700 dark:hover:text-blue-300" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Search</span>
</a>
<!-- Alerts -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 transition-transform duration-300 ease-out active:scale-90 hover:text-blue-700 dark:hover:text-blue-300 relative" href="#">
<span class="material-symbols-outlined">warning</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Alerts</span>
<div class="absolute top-1 right-5 w-2 h-2 bg-error rounded-full"></div>
</a>
<!-- Saved -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 transition-transform duration-300 ease-out active:scale-90 hover:text-blue-700 dark:hover:text-blue-300" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Saved</span>
</a>
</nav>
<!-- Contextual FAB for quick journey start -->
<button class="fixed right-6 bottom-28 w-14 h-14 glass-morphism shadow-2xl rounded-full flex items-center justify-center border border-white/40 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">directions</span>
</button>
</body></html>
